name: Update GBox catalog

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build catalog
        env:
          PLAYCOVER_SOURCES: ${{ vars.PLAYCOVER_SOURCES }}
          GBOX_SOURCE_NAME: ${{ vars.GBOX_SOURCE_NAME }}
          GBOX_SOURCE_AUTHOR: ${{ vars.GBOX_SOURCE_AUTHOR }}
          GBOX_SOURCE_DESCRIPTION: ${{ vars.GBOX_SOURCE_DESCRIPTION }}
          GBOX_SOURCE_IMAGE: ${{ vars.GBOX_SOURCE_IMAGE }}
          GBOX_DEFAULT_APP_TYPE: ${{ vars.GBOX_DEFAULT_APP_TYPE }}
          OUTPUT_PATH: ${{ vars.OUTPUT_PATH }}
        run: python src/convert.py

      - name: Build summary
        run: |
          echo "## Catalog run report" >> $GITHUB_STEP_SUMMARY
          cat output/last-run.json >> $GITHUB_STEP_SUMMARY

      - name: Commit and push changes
        run: |
          if git diff --quiet -- output/catalog.json output/last-run.json; then
            echo "No catalog changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/catalog.json output/last-run.json
          git commit -m "chore: update GBox catalog"
          git push
